apply plugin: 'com.android.application'
android {
    namespace 'com.pro.volleyball'
    compileSdk 34
    defaultConfig {
        applicationId "com.pro.volleyball"
        minSdk 29
        targetSdk 34
        versionCode 1
        versionName "1.0"
        externalNativeBuild { cmake { cppFlags "-std=c++17" } }
    }
    externalNativeBuild { cmake { path "src/main/cpp/CMakeLists.txt" } }
}
